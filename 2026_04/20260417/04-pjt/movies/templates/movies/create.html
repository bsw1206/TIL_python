{% extends "base.html" %}
{% block content %}
<form action="{% url 'movies:create' %}" method="POST">
  {% csrf_token %}
  
  {% if form.errors %}
    <div class="alert alert-danger">
      {{ form.errors }}
    </div>
  {% endif %}

  {{ form.as_p }}
  <input type="submit" value="제출" class="btn btn-primary">
</form>
{% endblock content %}
